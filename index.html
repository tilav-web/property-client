<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amaar Properties | Apartments for Sale and Rent</title>
    <meta
      name="description"
      content="Amaar Properties helps you discover apartments for sale and rent, browse trusted sellers, and search homes across Uzbekistan."
    />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="theme-color" content="#111827" />
    <link rel="canonical" href="https://amaarproperties.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Amaar Properties" />
    <meta
      property="og:title"
      content="Amaar Properties | Apartments for Sale and Rent"
    />
    <meta
      property="og:description"
      content="Browse apartments for sale and rent, explore sellers, and search property listings across Uzbekistan."
    />
    <meta property="og:url" content="https://amaarproperties.com/" />
    <meta
      property="og:image"
      content="https://amaarproperties.com/images/hero/home-hero-1600.webp"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Amaar Properties | Apartments for Sale and Rent"
    />
    <meta
      name="twitter:description"
      content="Browse apartments for sale and rent, explore sellers, and search property listings across Uzbekistan."
    />
    <meta
      name="twitter:image"
      content="https://amaarproperties.com/images/hero/home-hero-1600.webp"
    />
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #fff;
        color: #0f172a;
      }

      #root {
        min-height: 100vh;
      }

      .app-shell {
        min-height: 100vh;
        background: #fff;
      }

      .app-shell__header {
        border-bottom: 1px solid #e2e8f0;
      }

      .app-shell__header-inner,
      .app-shell__hero-inner,
      .app-shell__content {
        width: min(1200px, calc(100% - 32px));
        margin: 0 auto;
      }

      .app-shell__header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 0;
      }

      .app-shell__brand {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      .app-shell__nav {
        display: flex;
        gap: 12px;
      }

      .app-shell__chip,
      .app-shell__title,
      .app-shell__search,
      .app-shell__section-title,
      .app-shell__card {
        background: #e2e8f0;
      }

      .app-shell__chip {
        width: 56px;
        height: 14px;
        border-radius: 999px;
      }

      .app-shell__hero {
        background: #f8fafc;
        padding: 24px 0 32px;
      }

      .app-shell__hero-frame {
        position: relative;
        overflow: hidden;
        border-radius: 8px;
      }

      .app-shell__hero-media {
        height: 300px;
        background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 100%);
      }

      .app-shell__hero-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 24px;
      }

      .app-shell__title {
        width: min(680px, 92%);
        height: 48px;
        border-radius: 12px;
        opacity: 0.42;
      }

      .app-shell__search {
        width: min(720px, 100%);
        height: 56px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.9);
      }

      .app-shell__content {
        padding: 32px 0 48px;
      }

      .app-shell__section-title {
        width: min(260px, 70%);
        height: 28px;
        margin: 0 auto 18px;
        border-radius: 10px;
      }

      .app-shell__grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .app-shell__card {
        aspect-ratio: 4 / 3;
        border-radius: 8px;
      }

      @media (min-width: 640px) {
        .app-shell__grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (min-width: 1024px) {
        .app-shell__hero-media {
          height: 450px;
        }

        .app-shell__grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @keyframes app-shell-pulse {
        0%,
        100% {
          opacity: 0.65;
        }

        50% {
          opacity: 1;
        }
      }

      @media (prefers-reduced-motion: no-preference) {
        .app-shell__pulse {
          animation: app-shell-pulse 1.5s ease-in-out infinite;
        }
      }
    </style>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Amaar Properties",
        "url": "https://amaarproperties.com/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://amaarproperties.com/search?tag={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div class="app-shell" aria-hidden="true">
        <div class="app-shell__header">
          <div class="app-shell__header-inner">
            <div class="app-shell__brand">Amaar Properties</div>
            <div class="app-shell__nav">
              <div class="app-shell__chip app-shell__pulse"></div>
              <div class="app-shell__chip app-shell__pulse"></div>
              <div class="app-shell__chip app-shell__pulse"></div>
            </div>
          </div>
        </div>

        <div class="app-shell__hero">
          <div class="app-shell__hero-inner">
            <div class="app-shell__hero-frame">
              <div class="app-shell__hero-media"></div>
              <div class="app-shell__hero-overlay">
                <div class="app-shell__title app-shell__pulse"></div>
                <div class="app-shell__search app-shell__pulse"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="app-shell__content">
          <div class="app-shell__section-title app-shell__pulse"></div>
          <div class="app-shell__grid">
            <div class="app-shell__card app-shell__pulse"></div>
            <div class="app-shell__card app-shell__pulse"></div>
            <div class="app-shell__card app-shell__pulse"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
